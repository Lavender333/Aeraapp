name: Nightly Level 3 Pipeline

on:
  schedule:
    # Runs every day at 02:15 UTC
    - cron: '15 2 * * *'
  workflow_dispatch:

jobs:
  level3-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      AERA_MODEL_VERSION: ${{ vars.AERA_MODEL_VERSION || 'level3-2026.02' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements-level3.txt

      - name: Install pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements-level3.txt

      - name: Validate required secrets
        id: check-secrets
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY secrets are not configured. Skipping pipeline run."
            echo "secrets_available=false" >> "$GITHUB_OUTPUT"
          else
            echo "secrets_available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run nightly Level 3 pipeline
        if: steps.check-secrets.outputs.secrets_available == 'true'
        run: python scripts/nightly-level3-pipeline.py
